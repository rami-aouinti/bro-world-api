when@dev: &dev
    nelmio_api_doc:
        documentation:
            openapi: '3.0.0'
            servers:
                -   url: http://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTP
                -   url: https://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTPS
            info:
                title: Symfony Api
                description: This is an symfony api environment example
                version: 3.9.0
            components:
                parameters:
                    page:
                        name: page
                        in: query
                        required: false
                        schema:
                            type: integer
                            minimum: 1
                        example: 1
                    limit:
                        name: limit
                        in: query
                        required: false
                        schema:
                            type: integer
                            minimum: 1
                            maximum: 100
                        example: 20
                    q:
                        name: q
                        in: query
                        required: false
                        description: Filtre de recherche libre
                        schema:
                            type: string
                    status:
                        name: status
                        in: query
                        required: false
                        schema:
                            type: string
                securitySchemes:
                    Bearer:
                        type: http
                        scheme: bearer
                        bearerFormat: JWT
                    ApiKey:
                        type: apiKey
                        name: Authorization
                        description: 'Value: ApiKey {token}'
                        in: header
                schemas:
                    SchoolError:
                        type: object
                        required:
                            - message
                            - code
                            - details
                        properties:
                            message:
                                type: string
                                example: Forbidden application scope access.
                            code:
                                type: string
                                example: SCHOOL_FORBIDDEN
                            details:
                                type: array
                                items:
                                    type: object
                    SchoolValidationError:
                        type: object
                        required:
                            - message
                            - code
                            - details
                        properties:
                            message:
                                type: string
                                example: Validation failed.
                            code:
                                type: string
                                example: SCHOOL_VALIDATION_FAILED
                            details:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        propertyPath:
                                            type: string
                                            example: classId
                                        message:
                                            type: string
                                            example: This value should not be blank.
                                        code:
                                            type: string
                                            nullable: true
                    CrmErrorResponse:
                        type: object
                        required:
                            - message
                            - errors
                        properties:
                            message:
                                type: string
                                example: Validation failed.
                            errors:
                                type: array
                                items:
                                    type: object
                    ErrorResponse:
                        type: object
                        required:
                            - message
                            - errors
                        properties:
                            message:
                                type: string
                                example: Validation failed.
                            errors:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        propertyPath:
                                            type: string
                                            nullable: true
                                            example: issueTarget
                                        message:
                                            type: string
                                            nullable: true
                                            example: This value is not valid.
                                        code:
                                            type: string
                                            nullable: true
                                            example: c1051bb4-d103-4f74-8988-acbcafc7fdc3
                    JobAcceptedResponse:
                        type: object
                        required:
                            - jobId
                            - status
                        properties:
                            jobId:
                                type: string
                                format: uuid
                                example: 0dfde3e4-7095-4fab-bb54-f954ff4c16bd
                            status:
                                type: string
                                example: queued
                            summary:
                                type: object
                                nullable: true
                                properties:
                                    mode:
                                        type: string
                                        example: dry-run
                                    owner:
                                        type: string
                                        example: acme-org
                                    issueTarget:
                                        type: string
                                        enum: [task, task_request]
                                        example: task
                                    createPublicProject:
                                        type: boolean
                                        example: true
                                    plannedActions:
                                        type: array
                                        items:
                                            type: string
                    PaginatedResponse:
                        type: object
                        required:
                            - items
                        properties:
                            items:
                                type: array
                                items:
                                    type: object
                            pagination:
                                type: object
                                nullable: true
                            meta:
                                type: object
                                nullable: true
                    CrmContact:
                        type: object
                        properties:
                            id:
                                type: string
                                format: uuid
                            firstName:
                                type: string
                            lastName:
                                type: string
                            email:
                                type: string
                                format: email
                                nullable: true
                    CrmEmployee:
                        type: object
                        properties:
                            id:
                                type: string
                                format: uuid
                            fullName:
                                type: string
                            email:
                                type: string
                                format: email
                                nullable: true
                            roles:
                                type: array
                                items:
                                    type: string
                    CrmProject:
                        type: object
                        properties:
                            id:
                                type: string
                                format: uuid
                            name:
                                type: string
                            status:
                                type: string
                    CrmTask:
                        type: object
                        required:
                            - title
                            - projectId
                        properties:
                            title:
                                type: string
                                maxLength: 255
                            description:
                                type: string
                                nullable: true
                            status:
                                type: string
                                enum: [todo, in_progress, blocked, done]
                                nullable: true
                            priority:
                                type: string
                                enum: [low, medium, high, critical]
                                nullable: true
                            dueAt:
                                type: string
                                format: date-time
                                nullable: true
                            estimatedHours:
                                type: number
                                format: float
                                nullable: true
                            projectId:
                                type: string
                                format: uuid
                            sprintId:
                                type: string
                                format: uuid
                                nullable: true
                            assigneeIds:
                                type: array
                                nullable: true
                                items:
                                    type: string
                                    format: uuid
                    CrmTaskRequest:
                        type: object
                        required:
                            - title
                            - taskId
                            - repositoryId
                        properties:
                            title:
                                type: string
                                maxLength: 255
                            description:
                                type: string
                                nullable: true
                            status:
                                type: string
                                enum: [pending, approved, rejected]
                                nullable: true
                            resolvedAt:
                                type: string
                                format: date-time
                                nullable: true
                            taskId:
                                type: string
                                format: uuid
                            repositoryId:
                                type: string
                                format: uuid
                            assigneeIds:
                                type: array
                                nullable: true
                                items:
                                    type: string
                                    format: uuid
                    CrmGithubRepository:
                        type: object
                        properties:
                            id:
                                type: string
                                format: uuid
                                nullable: true
                            name:
                                type: string
                            fullName:
                                type: string
                            private:
                                type: boolean
                                nullable: true
                    CrmGithubIssue:
                        type: object
                        properties:
                            id:
                                type: integer
                            number:
                                type: integer
                            title:
                                type: string
                            state:
                                type: string
                    CrmGithubBranch:
                        type: object
                        properties:
                            name:
                                type: string
                            sha:
                                type: string
                                nullable: true
                            url:
                                type: string
                                nullable: true
                    CrmGithubBootstrapSyncRequest:
                        type: object
                        required:
                            - token
                            - owner
                        properties:
                            token:
                                type: string
                                example: ghp_xxxxxxxxx
                            owner:
                                type: string
                                example: acme-org
                            issueTarget:
                                type: string
                                enum: [task, task_request]
                                default: task
                            createPublicProject:
                                type: boolean
                                default: true
                            dryRun:
                                type: boolean
                                default: false
                responses:
                    ValidationFailed422:
                        description: Validation failed.
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/CrmErrorResponse'
                    NotFound404:
                        description: Resource not found.
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/CrmErrorResponse'
                    Unauthorized401:
                        description: Authentication required.
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/CrmErrorResponse'
                    Forbidden403:
                        description: Access denied.
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/CrmErrorResponse'
            security:
                -   Bearer: []
                -   ApiKey: []
        areas: # to filter documented areas
            default:
                path_patterns:
                    - ^/api(?!/doc(?:$|/|\.json$)) # Accepts routes under /api except /api/doc and module docs
            users:
                path_patterns:
                    - ^/api/v1/(?:auth|profile|user(?:s|_group)?|private/stories)(?:/|$)
            blog:
                path_patterns:
                    - ^/api/v1/private/blogs?(?:/|$)
            crm:
                path_patterns:
                    - ^/api/v1/crm(?:/|$)
            shop:
                path_patterns:
                    - ^/api/v1/shop(?:/|$)
            school:
                path_patterns:
                    - ^/api/v1/school(?:/|$)
            recruit:
                path_patterns:
                    - ^/api/v1/recruit(?:/|$)
            calendar:
                path_patterns:
                    - ^/api/v1/calendar(?:/|$)


when@test: *dev
