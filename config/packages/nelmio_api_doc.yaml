when@dev: &dev
    nelmio_api_doc:
        documentation:
            openapi: '3.0.0'
            servers:
                -   url: http://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTP
                -   url: https://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTPS
            info:
                title: Symfony Api
                description: This is an symfony api environment example
                version: 3.9.0
            components:
                securitySchemes:
                    Bearer:
                        type: http
                        scheme: bearer
                        bearerFormat: JWT
                    ApiKey:
                        type: apiKey
                        name: Authorization
                        description: 'Value: ApiKey {token}'
                        in: header
                schemas:
                    SchoolError:
                        type: object
                        required:
                            - message
                            - code
                            - details
                        properties:
                            message:
                                type: string
                                example: Forbidden application scope access.
                            code:
                                type: string
                                example: SCHOOL_FORBIDDEN
                            details:
                                type: array
                                items:
                                    type: object
                    SchoolValidationError:
                        type: object
                        required:
                            - message
                            - code
                            - details
                        properties:
                            message:
                                type: string
                                example: Validation failed.
                            code:
                                type: string
                                example: SCHOOL_VALIDATION_FAILED
                            details:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        propertyPath:
                                            type: string
                                            example: classId
                                        message:
                                            type: string
                                            example: This value should not be blank.
                                        code:
                                            type: string
                                            nullable: true
            security:
                -   Bearer: []
                -   ApiKey: []
        areas: # to filter documented areas
            path_patterns:
                - ^/api(?!/doc$) # Accepts routes under /api except /api/doc

when@test: *dev
