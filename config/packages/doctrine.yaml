doctrine:
    dbal:
        # configure these for your database server
        default_connection: default
        connections:
            default:
                driver: 'pdo_mysql'
                server_version: '%env(resolve:MYSQL_VERSION)%'
                charset: utf8mb4
                default_table_options:
                    charset: utf8mb4
                    collate: utf8mb4_unicode_ci
                # https://symfony.com/doc/current/messenger.html#doctrine-transport
                schema_filter: '~^(?!messenger_messages)~'
                url: '%env(resolve:DATABASE_URL)%'
                profiling_collect_backtrace: '%kernel.debug%'
        types:
            datetime: App\General\Domain\Doctrine\DBAL\Types\UTCDateTimeType
            datetimetz: App\General\Domain\Doctrine\DBAL\Types\UTCDateTimeType
            EnumLanguage: App\General\Domain\Doctrine\DBAL\Types\EnumLanguageType
            EnumLocale: App\General\Domain\Doctrine\DBAL\Types\EnumLocaleType
            EnumLogLogin: App\General\Domain\Doctrine\DBAL\Types\EnumLogLoginType

    orm:
        default_entity_manager: default
        controller_resolver:
            auto_mapping: false
        entity_managers:
            default:
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                #identity_generation_preferences:
                #    Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
                auto_mapping: true
                validate_xml_mapping: true
                connection: default
                mappings:
                    ApiKey:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/ApiKey/Domain/Entity'
                        prefix: 'App\ApiKey\Domain\Entity'
                        alias: ApiKey
                    Configuration:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Configuration/Domain/Entity'
                        prefix: 'App\Configuration\Domain\Entity'
                        alias: Configuration
                    DateDimension:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/DateDimension/Domain/Entity'
                        prefix: 'App\DateDimension\Domain\Entity'
                        alias: DateDimension
                    General:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/General/Domain/Entity'
                        prefix: 'App\General\Domain\Entity'
                        alias: General
                    Log:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Log/Domain/Entity'
                        prefix: 'App\Log\Domain\Entity'
                        alias: Log
                    Platform:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Platform/Domain/Entity'
                        prefix: 'App\Platform\Domain\Entity'
                        alias: Platform
                    Recruit:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Recruit/Domain/Entity'
                        prefix: 'App\Recruit\Domain\Entity'
                        alias: Recruit
                    Role:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Role/Domain/Entity'
                        prefix: 'App\Role\Domain\Entity'
                        alias: Role
                    Tool:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Tool/Domain/Entity'
                        prefix: 'App\Tool\Domain\Entity'
                        alias: Tool
                    User:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/User/Domain/Entity'
                        prefix: 'App\User\Domain\Entity'
                        alias: User
                    Calendar:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Calendar/Domain/Entity'
                        prefix: 'App\Calendar\Domain\Entity'
                        alias: Calendar
                    Chat:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Chat/Domain/Entity'
                        prefix: 'App\Chat\Domain\Entity'
                        alias: Chat
                    Blog:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Blog/Domain/Entity'
                        prefix: 'App\Blog\Domain\Entity'
                        alias: Blog
                    Quiz:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Quiz/Domain/Entity'
                        prefix: 'App\Quiz\Domain\Entity'
                        alias: Quiz
                    Shop:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Shop/Domain/Entity'
                        prefix: 'App\Shop\Domain\Entity'
                        alias: Shop
                    Crm:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Crm/Domain/Entity'
                        prefix: 'App\Crm\Domain\Entity'
                        alias: Crm
                    School:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/School/Domain/Entity'
                        prefix: 'App\School\Domain\Entity'
                        alias: School
                    Notification:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Notification/Domain/Entity'
                        prefix: 'App\Notification\Domain\Entity'
                        alias: Notification
                    Page:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Page/Domain/Entity'
                        prefix: 'App\Page\Domain\Entity'
                        alias: Page
                    Library:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Library/Domain/Entity'
                        prefix: 'App\Library\Domain\Entity'
                        alias: Library
                    Game:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Game/Domain/Entity'
                        prefix: 'App\Game\Domain\Entity'
                        alias: Game
                    Abonnement:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Abonnement/Domain/Entity'
                        prefix: 'App\Abonnement\Domain\Entity'
                        alias: Abonnement
                dql:
                    datetime_functions:
                        datesub: DoctrineExtensions\Query\Mysql\DateSub
                        now: DoctrineExtensions\Query\Mysql\Now
                    string_functions:
                        uuid_o_t_to_bin: App\General\Infrastructure\DQL\UuidOTToBin
                        bin_to_uuid_o_t: App\General\Infrastructure\DQL\BinToUuidOT

when@prod: &not-dev
    doctrine:
        dbal:
            logging: false
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool
    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system

when@staging: *not-dev

when@test:
    doctrine:
        dbal:
            logging: false
