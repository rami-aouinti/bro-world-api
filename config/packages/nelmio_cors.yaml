nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            - '%env(CORS_ALLOW_ORIGIN)%'
            - '^https?://localhost(:[0-9]+)?$'
            - '^https?://127\.0\.0\.1(:[0-9]+)?$'
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        expose_headers: ['Link', 'X-API-VERSION']
        max_age: 3600
    paths:
        '^/': null
